name: Checkov IaC and Config Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "30 7 * * 2" # Weekly Tuesday scan.

permissions:
  contents: read
  security-events: write

jobs:
  checkov:
    name: Scan IaC and workflow configs
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Checkov
        # Checkov scans GitHub Actions workflows, Dockerfiles, Terraform, Kubernetes,
        # and other IaC files for misconfigurations and policy violations.
        uses: bridgecrewio/checkov-action@fa9edf8f0a491c59a924ea6accd5bdcf07752cff # v12.3107.0
        with:
          directory: .
          framework: github_actions,dockerfile,kubernetes,terraform
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true # Upload findings to Code Scanning rather than blocking the build.

      - name: Upload Checkov SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov
