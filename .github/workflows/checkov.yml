name: Checkov IaC and Config Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "30 7 * * 2" # Weekly Tuesday scan.

permissions:
  contents: read
  security-events: write

jobs:
  checkov:
    name: Scan IaC and workflow configs
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Checkov
        # Checkov scans GitHub Actions workflows, Dockerfiles, Terraform, Kubernetes,
        # and other IaC files for misconfigurations and policy violations.
        uses: bridgecrewio/checkov-action@4a1afa9897f7afe297a3762c926e1e800361464f # v12.3111.0
        with:
          directory: .
          framework: github_actions,dockerfile,kubernetes,terraform
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true # Upload findings to Code Scanning rather than blocking the build.

      - name: Upload Checkov SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov
