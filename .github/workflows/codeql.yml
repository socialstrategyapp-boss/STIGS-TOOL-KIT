name: CodeQL Analysis

on:
  push:
    branches: ["main"] # Customize protected branches as needed.
  pull_request:
    branches: ["main"] # Add additional target branches if required.
  schedule:
    - cron: "30 4 * * 1" # Weekly Monday scan.

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit # Tighten to 'block' with an allowlist once egress is profiled.

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          # Set this to match the languages in your repository.
          # Example for multi-language projects: "javascript-typescript,python"
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
