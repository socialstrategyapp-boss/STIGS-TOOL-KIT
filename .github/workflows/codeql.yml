name: CodeQL Analysis

on:
  push:
    branches: ["main"] # Customize protected branches as needed.
  pull_request:
    branches: ["main"] # Add additional target branches if required.
  schedule:
    - cron: "30 4 * * 1" # Weekly Monday scan.

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          # Set this to match the languages in your repository.
          # Example for multi-language projects: "javascript-typescript,python"
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
