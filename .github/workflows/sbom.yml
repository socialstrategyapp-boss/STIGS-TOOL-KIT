name: Generate SBOM

on:
  push:
    branches: ["main"]
  release:
    types: [created]
  schedule:
    - cron: "0 6 * * 0" # Weekly Sunday generation.

permissions:
  contents: read
  id-token: write # Required for OIDC-based attestation.

jobs:
  sbom:
    name: Generate SBOM (SPDX)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate SBOM
        # anchore/sbom-action catalogues every file and dependency found in the repo
        # and produces a machine-readable Software Bill of Materials in SPDX-JSON format.
        # The resulting artifact is uploaded automatically to the workflow run.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          artifact-name: sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 90
