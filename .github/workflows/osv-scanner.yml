name: OSV-Scanner Dependency Scan

on:
  push:
    branches: ["main"] # Customize this trigger as your repo grows.
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "15 6 * * *" # Daily dependency vulnerability scan.

permissions:
  contents: read

jobs:
  osv-scan:
    name: Scan Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action@v1
        with:
          scan-args: |-
            -r
            .
            --skip-git
            --format
            table
