name: OSV-Scanner Dependency Scan

on:
  push:
    branches: ["main"] # Customize this trigger as your repo grows.
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "15 6 * * *" # Daily dependency vulnerability scan.

permissions:
  contents: read

jobs:
  osv-scan:
    name: Scan Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action@764c91816374ff2d8fc2095dab36eecd42d61638 # v1.9.2
        with:
          scan-args: |-
            -r
            .
            --skip-git
            --format
            table
