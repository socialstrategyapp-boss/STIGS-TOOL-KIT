name: Security Hygiene

on:
  pull_request:
    branches: ["main"] # Expand as needed.
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, AGPL-3.0 # Block copyleft licenses from entering the dependency tree.

  workflow-permissions-check:
    name: Workflow Permissions Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Ensure no write-all permissions are used
        run: |
          if grep -R --line-number "^permissions:[[:space:]]*write-all$" .github/workflows/*.yml; then
            echo "Found forbidden write-all workflow permissions."
            exit 1
          fi
          echo "No write-all permissions detected."

      - name: Ensure all actions are pinned to a commit SHA
        run: |
          unpinned=$(grep -Rn 'uses:' .github/workflows/*.yml \
            | grep -v '#' \
            | grep -v '@[0-9a-f]\{40\}' \
            | grep -v 'uses: \.' || true)
          if [ -n "$unpinned" ]; then
            echo "The following actions are not pinned to a full commit SHA:"
            echo "$unpinned"
            echo "Pin each action to a full 40-character commit SHA for supply-chain safety."
            exit 1
          fi
          echo "All actions are pinned to a commit SHA."
